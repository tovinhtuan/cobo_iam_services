# Example: single DNS, path prefix /public and /admin, strip prefix for upstream API.
# Copy and adapt server_name, TLS paths, upstream address, and rate limits.
# See `cobo_iam_services/docs/DEPLOY*.md` (gateway + security) for rollout.
# Note: if using limit_req for /admin/, define `limit_req_zone` in the `http {}` context.

# Upstream to cobo_iam_services (or load balancer in front of it)
upstream cobo_iam_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name api.example.com;

    # ssl_certificate     /path/fullchain.pem;
    # ssl_certificate_key /path/privkey.pem;

    client_max_body_size 20m;

    # Public surface: web app (cobo_web_design) — VITE_API_BASE_URL = https://api.example.com/public
    location /public/ {
        rewrite ^/public/(.*)$ /$1 break;
        proxy_pass http://cobo_iam_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # CMS (future) — add stricter `limit_req` in production (zone in `http` block)
    location /admin/ {
        rewrite ^/admin/(.*)$ /$1 break;
        proxy_pass http://cobo_iam_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Do not expose internal authorizer to the public host (P0 from deploy doc)
    location ^~ /internal/ {
        return 404;
    }

    # Health without prefix (optional; or use /public/healthz with rewrite)
    location = /healthz {
        proxy_pass http://cobo_iam_api/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
