openapi: 3.0.3
info:
  title: "cobo_iam_services — public & internal API snapshot"
  version: "1.0.0"
  description: |
    Danh sach endpoint dang dang ky trong `internal/httpserver` (handler modules). Mau JSON chi tiet: `api-contracts-json.md`. Bao gom: health, auth (login-password-key, login, refresh, logout, recovery, select/switch), me/*, sessions, admin, disclosure, workflow, notification, noi bo authorize.
  x-oas-source: api-v1-implemented-contracts.json
servers:
  - url: /
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorBody:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: object, additionalProperties: true }
